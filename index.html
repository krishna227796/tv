<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TvFlix</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="app-name">TvFlix</div>
    <button id="power-btn">⏻</button>
  </header>

  <main>
    <h1>Welcome to TvFlix</h1>
    <div class="movie-container">
      <!-- Example movie cards -->
        <div class="movie-card" data-video="https://streamtape.com/v/r2Qgd08ePBfbJz7/videoplayback.mp4">
        <img src="poster1.jpg" alt="Movie 1">
        <p>Movie 1</p>
      </div>
      <div class="movie-card" data-video="movie2.mp4">
        <img src="poster2.jpg" alt="Movie 2">
        <p>Movie 2</p>
      </div>
      <div class="movie-card" data-video="movie3.mp4">
        <img src="poster3.jpg" alt="Movie 3">
        <p>Movie 3</p>
      </div>
      <!-- Add more cards as needed -->
    </div>
  </main>

  <!-- Fullscreen video modal -->
  <div id="video-modal">
    <video id="video-player" controls autoplay></video>
    <button id="close-video">✖</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
